<script>
(function () {
  "use strict";

  // --- HTML escaping ---
  function esc(s) {
    return s.replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
  }

  // --- Inline parser ---
  // Tokenizes inline spans while protecting code spans from further parsing.
  function parseInline(text) {
    var out = "";
    var i = 0;
    var n = text.length;
    while (i < n) {
      var c = text[i];

      // inline code: `code` or ``co`de``
      if (c === "`") {
        var run = 1;
        while (text[i + run] === "`") run++;
        var fence = "`".repeat(run);
        var end = text.indexOf(fence, i + run);
        if (end !== -1) {
          var code = text.slice(i + run, end);
          // a single leading/trailing space is stripped per CommonMark
          if (code.length > 1 && code[0] === " " && code[code.length - 1] === " ") {
            code = code.slice(1, -1);
          }
          out += "<code>" + esc(code) + "</code>";
          i = end + run;
          continue;
        }
      }

      // escaped char
      if (c === "\\" && i + 1 < n && "\\`*_{}[]()#+-.!>~|".indexOf(text[i + 1]) !== -1) {
        out += esc(text[i + 1]);
        i += 2;
        continue;
      }

      // images: ![alt](url "title")
      if (c === "!" && text[i + 1] === "[") {
        var img = matchLink(text, i + 1);
        if (img) {
          var altAttr = esc(stripInlineMarkup(img.label));
          out += '<img src="' + esc(img.url) + '" alt="' + altAttr + '"' +
                 (img.title ? ' title="' + esc(img.title) + '"' : "") + ">";
          i = img.end;
          continue;
        }
      }

      // links: [text](url "title")
      if (c === "[") {
        var lnk = matchLink(text, i);
        if (lnk) {
          out += '<a href="' + esc(lnk.url) + '"' +
                 (lnk.title ? ' title="' + esc(lnk.title) + '"' : "") +
                 ">" + parseInline(lnk.label) + "</a>";
          i = lnk.end;
          continue;
        }
      }

      // strong + emphasis with * or _
      if (c === "*" || c === "_") {
        var em = matchEmphasis(text, i, c);
        if (em) {
          out += em.html;
          i = em.end;
          continue;
        }
      }

      // strikethrough ~~text~~
      if (c === "~" && text[i + 1] === "~") {
        var sEnd = text.indexOf("~~", i + 2);
        if (sEnd !== -1) {
          out += "<del>" + parseInline(text.slice(i + 2, sEnd)) + "</del>";
          i = sEnd + 2;
          continue;
        }
      }

      // autolink <https://...>
      if (c === "<") {
        var gt = text.indexOf(">", i);
        if (gt !== -1) {
          var inner = text.slice(i + 1, gt);
          if (/^https?:\/\/[^\s<>]+$/.test(inner)) {
            out += '<a href="' + esc(inner) + '">' + esc(inner) + "</a>";
            i = gt + 1;
            continue;
          }
          if (/^[^\s@<>]+@[^\s@<>]+\.[^\s@<>]+$/.test(inner)) {
            out += '<a href="mailto:' + esc(inner) + '">' + esc(inner) + "</a>";
            i = gt + 1;
            continue;
          }
        }
      }

      // hard line break: two trailing spaces before newline
      if (c === "\n") {
        if (out.length >= 2 && out.slice(-2) === "  ") {
          out = out.slice(0, -2) + "<br>\n";
        } else {
          out += "\n";
        }
        i++;
        continue;
      }

      out += esc(c);
      i++;
    }
    return out;
  }

  // Match a [label](url "title") starting at the opening bracket index.
  function matchLink(text, start) {
    if (text[start] !== "[") return null;
    var depth = 1;
    var i = start + 1;
    while (i < text.length && depth > 0) {
      if (text[i] === "\\") { i += 2; continue; }
      if (text[i] === "[") depth++;
      else if (text[i] === "]") depth--;
      if (depth === 0) break;
      i++;
    }
    if (depth !== 0) return null;
    var label = text.slice(start + 1, i);
    if (text[i + 1] !== "(") return null;
    var j = i + 2;
    var pdepth = 1;
    var inner = "";
    while (j < text.length && pdepth > 0) {
      var ch = text[j];
      if (ch === "\\") { inner += ch + (text[j + 1] || ""); j += 2; continue; }
      if (ch === "(") pdepth++;
      else if (ch === ")") { pdepth--; if (pdepth === 0) break; }
      inner += ch;
      j++;
    }
    if (pdepth !== 0) return null;
    inner = inner.trim();
    var url = inner, title = "";
    var tm = inner.match(/^(\S+)\s+"([^"]*)"$/) || inner.match(/^(\S+)\s+'([^']*)'$/);
    if (tm) { url = tm[1]; title = tm[2]; }
    // strip optional angle brackets around url
    if (url[0] === "<" && url[url.length - 1] === ">") url = url.slice(1, -1);
    url = sanitizeUrl(url);
    return { label: label, url: url, title: title, end: j + 1 };
  }

  // Block dangerous URL schemes; allow http, https, mailto, relative, anchors.
  function sanitizeUrl(url) {
    var trimmed = url.trim();
    if (/^\s*javascript:/i.test(trimmed) || /^\s*data:/i.test(trimmed) || /^\s*vbscript:/i.test(trimmed)) {
      return "#";
    }
    return trimmed;
  }

  function matchEmphasis(text, start, marker) {
    // count run of markers
    var run = 0;
    while (text[start + run] === marker) run++;
    // strong (2) then emphasis (1)
    if (run >= 2) {
      var closeStrong = findClosing(text, start + 2, marker, 2);
      if (closeStrong !== -1) {
        var content = text.slice(start + 2, closeStrong);
        return { html: "<strong>" + parseInline(content) + "</strong>", end: closeStrong + 2 };
      }
    }
    if (run >= 1) {
      var closeEm = findClosing(text, start + 1, marker, 1);
      if (closeEm !== -1) {
        var c2 = text.slice(start + 1, closeEm);
        return { html: "<em>" + parseInline(c2) + "</em>", end: closeEm + 1 };
      }
    }
    return null;
  }

  function findClosing(text, from, marker, count) {
    var i = from;
    while (i < text.length) {
      if (text[i] === "\\") { i += 2; continue; }
      if (text[i] === "`") { // skip code spans inside
        var r = 1; while (text[i + r] === "`") r++;
        var f = "`".repeat(r);
        var e = text.indexOf(f, i + r);
        if (e !== -1) { i = e + r; continue; }
      }
      if (text[i] === marker) {
        var run = 0;
        while (text[i + run] === marker) run++;
        if (run >= count && i > from) {
          // not preceded by whitespace right inside, and not opening another
          if (text[i - 1] !== " ") return i;
        }
        i += run;
        continue;
      }
      i++;
    }
    return -1;
  }

  function stripInlineMarkup(s) {
    return s.replace(/[*_`~]/g, "");
  }

  // --- Block parser ---
  function render(src) {
    src = src.replace(/\r\n?/g, "\n");
    var lines = src.split("\n");
    var html = [];
    var i = 0;

    function isBlank(l) { return /^\s*$/.test(l); }

    while (i < lines.length) {
      var line = lines[i];

      // blank line
      if (isBlank(line)) { i++; continue; }

      // fenced code block ``` or ~~~
      var fence = line.match(/^(\s*)(`{3,}|~{3,})(.*)$/);
      if (fence) {
        var indent = fence[1].length;
        var marker = fence[2][0];
        var minLen = fence[2].length;
        var lang = fence[3].trim().split(/\s+/)[0];
        var buf = [];
        i++;
        while (i < lines.length) {
          var cl = lines[i].match(/^(\s*)(`{3,}|~{3,})\s*$/);
          if (cl && cl[2][0] === marker && cl[2].length >= minLen) { i++; break; }
          // strip the opening indentation from content lines
          buf.push(lines[i].slice(indent));
          i++;
        }
        var cls = lang ? ' class="language-' + esc(lang) + '"' : "";
        html.push("<pre><code" + cls + ">" + esc(buf.join("\n")) + "</code></pre>");
        continue;
      }

      // ATX heading
      var h = line.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
      if (h) {
        var level = h[1].length;
        html.push("<h" + level + ">" + parseInline(h[2]) + "</h" + level + ">");
        i++;
        continue;
      }

      // horizontal rule
      if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)) {
        html.push("<hr>");
        i++;
        continue;
      }

      // blockquote
      if (/^\s*>/.test(line)) {
        var qbuf = [];
        while (i < lines.length && /^\s*>/.test(lines[i])) {
          qbuf.push(lines[i].replace(/^\s*>\s?/, ""));
          i++;
        }
        html.push("<blockquote>" + render(qbuf.join("\n")) + "</blockquote>");
        continue;
      }

      // table (GFM): header row, delimiter row of ---|---
      if (line.indexOf("|") !== -1 && i + 1 < lines.length &&
          /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)+\|?\s*$/.test(lines[i + 1])) {
        var tbl = parseTable(lines, i);
        if (tbl) { html.push(tbl.html); i = tbl.end; continue; }
      }

      // lists (ordered and unordered, with nesting)
      if (/^\s*([-+*]|\d+[.)])\s+/.test(line)) {
        var list = parseList(lines, i, 0);
        html.push(list.html);
        i = list.end;
        continue;
      }

      // paragraph: gather until blank or block starter
      var pbuf = [];
      while (i < lines.length && !isBlank(lines[i]) &&
             !/^(\s*)(`{3,}|~{3,})/.test(lines[i]) &&
             !/^#{1,6}\s+/.test(lines[i]) &&
             !/^\s*>/.test(lines[i]) &&
             !/^\s*([-*_])(\s*\1){2,}\s*$/.test(lines[i]) &&
             !/^\s*([-+*]|\d+[.)])\s+/.test(lines[i])) {
        pbuf.push(lines[i]);
        i++;
      }
      if (pbuf.length) {
        html.push("<p>" + parseInline(pbuf.join("\n")) + "</p>");
      }
    }

    return html.join("\n");
  }

  function parseTable(lines, start) {
    function cells(row) {
      var r = row.trim();
      if (r[0] === "|") r = r.slice(1);
      if (r[r.length - 1] === "|") r = r.slice(0, -1);
      var res = [];
      var cur = "";
      for (var k = 0; k < r.length; k++) {
        if (r[k] === "\\") { cur += r[k] + (r[k + 1] || ""); k++; continue; }
        if (r[k] === "|") { res.push(cur); cur = ""; continue; }
        cur += r[k];
      }
      res.push(cur);
      return res.map(function (c) { return c.trim(); });
    }
    var header = cells(lines[start]);
    var delim = cells(lines[start + 1]);
    var aligns = delim.map(function (d) {
      var l = d[0] === ":";
      var r = d[d.length - 1] === ":";
      if (l && r) return "center";
      if (r) return "right";
      if (l) return "left";
      return "";
    });
    var rows = [];
    var i = start + 2;
    while (i < lines.length && lines[i].indexOf("|") !== -1 && !/^\s*$/.test(lines[i])) {
      rows.push(cells(lines[i]));
      i++;
    }
    function alignAttr(idx) { return aligns[idx] ? ' style="text-align:' + aligns[idx] + '"' : ""; }
    var out = "<table>\n<thead>\n<tr>";
    header.forEach(function (c, idx) { out += "<th" + alignAttr(idx) + ">" + parseInline(c) + "</th>"; });
    out += "</tr>\n</thead>\n<tbody>\n";
    rows.forEach(function (row) {
      out += "<tr>";
      for (var c = 0; c < header.length; c++) {
        out += "<td" + alignAttr(c) + ">" + parseInline(row[c] || "") + "</td>";
      }
      out += "</tr>\n";
    });
    out += "</tbody>\n</table>";
    return { html: out, end: i };
  }

  function parseList(lines, start, baseIndent) {
    var firstMatch = lines[start].match(/^(\s*)([-+*]|\d+[.)])(\s+)/);
    var indent = firstMatch[1].length;
    var ordered = /\d/.test(firstMatch[2]);
    var startNum = ordered ? parseInt(firstMatch[2], 10) : 1;
    var items = [];
    var i = start;

    while (i < lines.length) {
      var m = lines[i].match(/^(\s*)([-+*]|\d+[.)])(\s+)(.*)$/);
      if (!m) {
        // blank line: could be a loose list separator; peek ahead
        if (/^\s*$/.test(lines[i])) {
          // check if list continues after blanks
          var j = i + 1;
          while (j < lines.length && /^\s*$/.test(lines[j])) j++;
          if (j < lines.length) {
            var mm = lines[j].match(/^(\s*)([-+*]|\d+[.)])(\s+)/);
            var cont = lines[j].match(/^(\s+)\S/);
            if (mm && mm[1].length === indent) { i = j; continue; }
            if (cont && cont[1].length > indent) { i = j; continue; }
          }
          break;
        }
        // continuation / lazy paragraph line belonging to current item
        var contMatch = lines[i].match(/^(\s+)\S/);
        if (items.length && contMatch && contMatch[1].length > indent) {
          items[items.length - 1].content.push(lines[i].slice(indent));
          i++;
          continue;
        }
        if (items.length && !/^\s/.test(lines[i]) && !/^\s*$/.test(lines[i])) {
          // lazy continuation
          items[items.length - 1].content.push(lines[i]);
          i++;
          continue;
        }
        break;
      }
      if (m[1].length < indent) break;
      if (m[1].length > indent) {
        // deeper indented item belongs to previous item content
        if (items.length) {
          items[items.length - 1].content.push(lines[i].slice(indent));
          i++;
          continue;
        }
      }
      // new item at this level
      var marker = m[2];
      var thisOrdered = /\d/.test(marker);
      if (thisOrdered !== ordered) break;
      items.push({ content: [m[4]], marker: marker });
      i++;
    }

    var tag = ordered ? "ol" : "ul";
    var attr = (ordered && startNum !== 1) ? ' start="' + startNum + '"' : "";
    var out = "<" + tag + attr + ">\n";
    items.forEach(function (it) {
      var body = it.content.join("\n");
      // task list item
      var task = body.match(/^\s*\[([ xX])\]\s+([\s\S]*)$/);
      if (task) {
        var checked = task[1].toLowerCase() === "x" ? " checked" : "";
        var rest = renderItemBody(task[2]);
        out += "<li><input type=\"checkbox\" disabled" + checked + "> " + rest + "</li>\n";
      } else {
        out += "<li>" + renderItemBody(body) + "</li>\n";
      }
    });
    out += "</" + tag + ">";
    return { html: out, end: i };
  }

  // Render the body of a list item: tight items stay inline, items with
  // nested blocks/lists get full block rendering.
  function renderItemBody(body) {
    var hasNested = /\n\s*([-+*]|\d+[.)])\s+/.test(body) ||
                    /\n\s*\n/.test(body) ||
                    /^\s*([-+*]|\d+[.)])\s+/m.test(body.split("\n").slice(1).join("\n")) ||
                    /\n\s*(`{3,}|~{3,})/.test(body) ||
                    /\n\s*>/.test(body);
    if (hasNested) {
      var rendered = render(body).trim();
      // unwrap a single leading <p> for tighter output
      rendered = rendered.replace(/^<p>([\s\S]*?)<\/p>\n?/, function (mt, inner) {
        return inner + (rendered.length > mt.length ? "\n" : "");
      });
      return rendered;
    }
    return parseInline(body.trim());
  }

  // --- Wire up UI ---
  var input = document.getElementById("input");
  var preview = document.getElementById("preview");
  var htmlsource = document.getElementById("htmlsource");
  var toggleBtn = document.getElementById("toggleBtn");
  var viewLabel = document.getElementById("viewLabel");
  var copyHtmlBtn = document.getElementById("copyHtmlBtn");
  var copyMdBtn = document.getElementById("copyMdBtn");
  var clearBtn = document.getElementById("clearBtn");
  var showingSource = false;
  var lastHtml = "";

  function update() {
    var md = input.value;
    var rendered;
    try {
      rendered = md.trim() === "" ? '<p class="empty">Nothing to preview yet. Start typing markdown on the left.</p>' : render(md);
    } catch (err) {
      rendered = '<p class="empty">Could not render: ' + esc(String(err && err.message ? err.message : err)) + "</p>";
    }
    lastHtml = (md.trim() === "") ? "" : rendered;
    preview.innerHTML = rendered;
    htmlsource.textContent = lastHtml;
  }

  function flash(btn, label) {
    var orig = btn.textContent;
    btn.textContent = label;
    setTimeout(function () { btn.textContent = orig; }, 1200);
  }

  function copyText(text, btn) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        flash(btn, "Copied");
      }, function () {
        fallbackCopy(text, btn);
      });
    } else {
      fallbackCopy(text, btn);
    }
  }

  function fallbackCopy(text, btn) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand("copy");
      flash(btn, "Copied");
    } catch (e) {
      flash(btn, "Copy failed");
    }
    document.body.removeChild(ta);
  }

  toggleBtn.addEventListener("click", function () {
    showingSource = !showingSource;
    if (showingSource) {
      preview.style.display = "none";
      htmlsource.style.display = "block";
      toggleBtn.textContent = "View preview";
      viewLabel.textContent = "HTML source";
    } else {
      preview.style.display = "block";
      htmlsource.style.display = "none";
      toggleBtn.textContent = "View HTML source";
      viewLabel.textContent = "Preview";
    }
  });

  copyHtmlBtn.addEventListener("click", function () { copyText(lastHtml, copyHtmlBtn); });
  copyMdBtn.addEventListener("click", function () { copyText(input.value, copyMdBtn); });
  clearBtn.addEventListener("click", function () { input.value = ""; update(); input.focus(); });

  input.addEventListener("input", update);

  // Tab inserts two spaces instead of moving focus.
  input.addEventListener("keydown", function (e) {
    if (e.key === "Tab") {
      e.preventDefault();
      var s = input.selectionStart, en = input.selectionEnd;
      input.value = input.value.slice(0, s) + "  " + input.value.slice(en);
      input.selectionStart = input.selectionEnd = s + 2;
      update();
    }
  });

  // Seed with a small sample so the tool is self-explanatory.
  input.value = [
    "# Markdown Previewer",
    "",
    "Type on the **left**, rendered HTML appears on the *right*.",
    "",
    "## Features",
    "",
    "- Headings, **bold**, *italic*, `inline code`",
    "- [Links](https://elitesystem.ai) and lists",
    "- Task lists:",
    "  - [x] runs entirely in your browser",
    "  - [ ] nothing leaves your machine",
    "",
    "> Blockquotes, tables, and fenced code work too.",
    "",
    "```js",
    "function hello(name) {",
    "  return `Hi, ${name}`;",
    "}",
    "```",
    "",
    "| Feature | Status |",
    "| ------- | :----: |",
    "| Tables  | yes    |",
    "| Privacy | total  |"
  ].join("\n");

  update();
})();
</script>
</body>
</html>
